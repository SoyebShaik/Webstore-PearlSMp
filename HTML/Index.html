<div class="currency-wrap">
    <div class="currency-trigger" id="currency-switch">
        <i class="fas fa-money-bill-wave"></i>
        <span id="current-code">USD</span>
        <i class="fas fa-caret-down"></i>
    </div>
    <div class="currency-dropdown" id="currency-menu">
        <div onclick="setCurrency('INR')">INR</div>
        <div onclick="setCurrency('USD')">USD</div>
    </div>
    <a href="Cart.html"><i class="fas fa-shopping-basket basket-icon"></i></a>
</div>

<div id="login-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>PLEASE ENTER YOUR USERNAME TO CONTINUE</h3>
        <input type="text" id="username-input" placeholder="Username">
        <button onclick="confirmLogin()">Continue <i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<script>
    // Toggle Currency Dropdown
    const curBtn = document.getElementById('currency-switch');
    const curMenu = document.getElementById('currency-menu');
    curBtn.onclick = (e) => {
        e.stopPropagation();
        curMenu.classList.toggle('show');
    };

    function setCurrency(code) {
        document.getElementById('current-code').innerText = code;
        curMenu.classList.remove('show');
        // If USD, you mentioned checkout via PayPal in INR. 
        // We can track this choice for the Shop.html later.
    }

    // Toggle Login Modal
    function updateSkin() {
        document.getElementById('login-modal').classList.add('active');
    }

    function confirmLogin() {
        const name = document.getElementById('username-input').value;
        if (name.trim() !== "") {
            document.getElementById('skin-head').src = `https://mc-heads.net/avatar/${name}`;
            document.getElementById('player-name').innerText = name;
            document.getElementById('login-modal').classList.remove('active');
        }
    }

    // Close menus if clicking outside
    window.onclick = () => {
        curMenu.classList.remove('show');
    };
</script>
