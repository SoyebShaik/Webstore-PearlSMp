<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StealFun | Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../Images/1000340540-removebg-preview.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/Base.css">
</head>
<body>
    <div class="shulker-wrapper">
        <header class="logo-container">
            <img src="../Images/1000340540-removebg-preview.png" class="server-logo" alt="StealFun Logo">
        </header>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-value" id="discord-count">Loading..</div>
                <div class="stat-icon"><i class="fab fa-discord"></i></div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="player-count">Loading..</div>
                <div class="stat-icon"><i class="fas fa-fire"></i></div>
            </div>
        </div>

        <div class="nav-container">
            <div class="category-header"><i class="fas fa-bars"></i> SELECT A CATEGORY</div>
            <nav class="nav-links">
                <a href="Index.html"><i class="fas fa-home"></i> HOME</a>
                <a href="Shop.html"><i class="fas fa-shopping-cart"></i> RANKS</a>
                <a href="Rules.html"><i class="fas fa-book"></i> RULES</a>
                <a href="https://discord.com"><i class="fab fa-discord"></i> DISCORD</a>
            </nav>
            
            <div class="user-control-bar">
                <div class="user-login" onclick="toggleLoginModal()">
                    <div class="login-text">
                        <span class="guest-label">GUEST</span>
                        <span id="player-name" class="click-to-login">CLICK TO LOGIN</span>
                    </div>
                    <img id="skin-head" src="https://mc-heads.net/avatar/steve" alt="avatar">
                </div>
                <div class="currency-wrap">
                    <div id="currency-switch"><span>USD</span> <i class="fas fa-caret-down"></i></div>
                    <a href="Cart.html"><i class="fas fa-shopping-basket basket-icon"></i></a>
                </div>
            </div>
        </div>

        <main class="welcome-section">
            <h2 class="featured-title">FEATURED PACKAGES</h2>
            <div class="featured-grid" id="featured-packages">
                <p style="text-align:center; color:#888;">Fetching packages from Tebex...</p>
            </div>
        </main>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>MINECRAFT USERNAME</h3>
            <input type="text" id="username-input" placeholder="Username...">
            <button onclick="confirmLogin()">CONTINUE</button>
        </div>
    </div>

    <script>
        const TOKEN = '128lk-68be7ee01f103beb904ec9a403b87f86c3a96cfa';

        async function loadData() {
            // Load Tebex Packages
            try {
                const r = await fetch(`https://headless.tebex.io/api/accounts/${TOKEN}/packages`);
                const data = await r.json();
                const container = document.getElementById('featured-packages');
                container.innerHTML = '';
                
                data.slice(0, 6).forEach(pkg => {
                    let glow = 'glow-grey';
                    const name = pkg.name.toLowerCase();
                    if(name.includes('god')) glow = 'glow-green';
                    else if(name.includes('coins')) glow = 'glow-gold';
                    else if(name.includes('supreme')) glow = 'glow-blue';

                    container.innerHTML += `
                        <div class="package-card ${glow}">
                            <img src="${pkg.image || '../Images/logo.png'}" class="pkg-img">
                            <div class="pkg-info">
                                <div class="pkg-name">${pkg.name}</div>
                                <div class="pkg-price">${pkg.price} ${pkg.currency}</div>
                            </div>
                        </div>`;
                });
            } catch(e) { console.error(e); }

            // Load Discord (Using your server ID if you have it, otherwise static)
            document.getElementById('discord-count').innerText = "5,064"; 
            document.getElementById('player-count').innerText = "124";
        }
        loadData();

        function toggleLoginModal() { document.getElementById('login-modal').classList.add('active'); }
        function confirmLogin() {
            const val = document.getElementById('username-input').value;
            if(val) {
                document.getElementById('player-name').innerText = val.toUpperCase();
                document.getElementById('skin-head').src = `https://mc-heads.net/avatar/${val}`;
                document.getElementById('login-modal').classList.remove('active');
            }
        }
    </script>
</body>
                    </html>
