<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StealFun | Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../Images/1000340540-removebg-preview.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/Base.css">
</head>
<body>

    <div class="top-bar">
        <div class="user-login" onclick="toggleLoginModal()">
            <div class="login-text">
                <span class="guest-label">Guest</span>
                <span id="player-name" class="click-to-login">CLICK TO LOGIN</span>
            </div>
            <img id="skin-head" src="https://mc-heads.net/avatar/MHF_Question" alt="avatar">
        </div>
    </div>

    <header class="logo-container">
        <img src="../Images/1000340540-removebg-preview.png" class="server-logo" alt="StealFun Logo">
    </header>

    <div class="stats-container">
        <div class="stat-box">
            <div class="stat-value" id="discord-count">0</div>
            <div class="stat-icon"><i class="fab fa-discord"></i></div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="player-count">124</div>
            <div class="stat-icon"><i class="fas fa-fire"></i></div>
        </div>
    </div>

    <div class="main-content">
        <div class="category-wrapper">
            <div class="category-header" onclick="toggleCategories()">
                <i class="fas fa-bars"></i> SELECT A CATEGORY
            </div>
            <div id="category-menu" class="category-menu">
                <a href="Index.html"><i class="fas fa-home"></i> Home</a>
                <a href="#"><i class="fas fa-shopping-cart"></i> Ranks</a>
                <a href="#"><i class="fas fa-coins"></i> Coins</a>
                <a href="https://discord.gg/stealfun"><i class="fab fa-discord"></i> Discord</a>
            </div>
        </div>

        <h2 class="featured-title">FEATURED PACKAGES</h2>
        <div class="featured-grid" id="featured-packages">
            <p style="text-align:center; color:#888;">Loading packages...</p>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>Please enter your username to continue</h2>
            <p class="modal-subtext">Usernames are Case Sensitive and cannot contain spaces.</p>
            
            <div class="input-wrapper">
                <img id="modal-face" src="https://mc-heads.net/avatar/MHF_Question" alt="face">
                <input type="text" id="username-input" placeholder="Username..." oninput="updateModalFace(this.value)">
            </div>

            <button class="continue-btn" onclick="confirmLogin()">CONTINUE</button>

            <div class="bedrock-toggle">
                <span>Bedrock user?</span>
                <div class="toggle-box">No</div>
            </div>
        </div>
    </div>

    <script>
        const TOKEN = '128lk-68be7ee01f103beb904ec9a403b87f86c3a96cfa'; //
        const DISCORD_SERVER_ID = '1435586958570295408'; //

        function toggleCategories() { document.getElementById('category-menu').classList.toggle('active'); }
        function toggleLoginModal() { document.getElementById('login-modal').classList.add('active'); }
        function closeModal() { document.getElementById('login-modal').classList.remove('active'); }

        // Close dropdown if clicking elsewhere
        window.addEventListener('click', function(e) {
            if (!document.querySelector('.category-wrapper').contains(e.target)) {
                document.getElementById('category-menu').classList.remove('active');
            }
        });

        async function loadData() {
            // Fetch Packages
            try {
                const r = await fetch(`https://headless.tebex.io/api/accounts/${TOKEN}/packages`);
                const data = await r.json();
                const container = document.getElementById('featured-packages');
                container.innerHTML = '';
                data.slice(0, 6).forEach(pkg => {
                    container.innerHTML += `
                        <div class="package-card">
                            <img src="${pkg.image || '../Images/logo.png'}" class="pkg-img">
                            <div class="pkg-info">
                                <div class="pkg-name">${pkg.name}</div>
                                <div class="pkg-price">${pkg.price} ${pkg.currency}</div>
                            </div>
                        </div>`;
                });
            } catch(e) { console.error("Tebex Error", e); }

            // Fetch Discord count
            try {
                const dRes = await fetch(`https://discord.com/api/guilds/${DISCORD_SERVER_ID}/widget.json`);
                const dData = await dRes.json();
                document.getElementById('discord-count').innerText = dData.presence_count || 0;
            } catch (e) { 
                document.getElementById('discord-count').innerText = "OFFLINE";
            }
        }
        
        function updateModalFace(val) {
            document.getElementById('modal-face').src = val ? `https://mc-heads.net/avatar/${val}` : `https://mc-heads.net/avatar/MHF_Question`;
        }

        function confirmLogin() {
            const val = document.getElementById('username-input').value;
            if(val) {
                document.getElementById('player-name').innerText = val.toUpperCase();
                document.getElementById('skin-head').src = `https://mc-heads.net/avatar/${val}`;
                closeModal();
            }
        }

        loadData();
    </script>
</body>
    </html>
